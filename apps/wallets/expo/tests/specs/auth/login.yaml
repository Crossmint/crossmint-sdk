appId: com.crossmint.walletsplayground
env:
  MAILOSAUR_API_KEY: ${MAILOSAUR_API_KEY}
  MAILOSAUR_SERVER_ID: ${MAILOSAUR_SERVER_ID}
---
# Step 1: Generate a unique test email for this run (mirrors web test pattern)
- runScript:
    file: ../../shared/utils/generateEmail.js

# Step 2: Launch app with clean state (iOS: clears Keychain; Android: clears AsyncStorage/SecureStore)
- launchApp:
    clearKeychain: true
    clearState: true
# Wait up to 30s for the login screen — Android needs time to reload the JS bundle from Metro
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 30000

# Step 3: Enter email and request OTP
- tapOn:
    id: "email-input"
- inputText: ${output.email}
- tapOn:
    id: "send-code-button"

# Step 4: Wait for and retrieve the 6-digit login OTP from Mailosaur
- runScript:
    file: ../../shared/utils/getOtp.js
    env:
      EMAIL: ${output.email}

# Step 5: Enter OTP and verify
- tapOn:
    id: "otp-input"
- inputText: ${output.otp}
- tapOn:
    id: "verify-button"

# Step 6: Assert wallet dashboard loaded (logout-button confirms successful auth)
- extendedWaitUntil:
    visible:
      id: "logout-button"
    timeout: 30000
