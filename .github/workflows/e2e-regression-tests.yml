name: E2E Regression Tests

on:
    schedule:
        - cron: "0 7 * * *"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    e2e-regression-tests:
        name: Run E2E Tests (${{ matrix.browser }})
        runs-on: ubuntu-latest
        timeout-minutes: 90
        strategy:
            fail-fast: false
            matrix:
                browser: [chromium, firefox, webkit]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 9

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright browsers
              run: pnpm exec playwright install --with-deps ${{ matrix.browser }}
              working-directory: apps/wallets/quickstart-devkit

            - name: Build dependencies
              run: pnpm build --filter=@crossmint/client-sdk-react-ui --filter=@crossmint/wallets-sdk --filter=@crossmint/client-sdk-react-base
              working-directory: .

            - name: Run E2E regression tests (${{ matrix.browser }})
              id: run-tests
              working-directory: apps/wallets/quickstart-devkit
              env:
                  NEXT_PUBLIC_CROSSMINT_API_KEY: ${{ secrets.NEXT_PUBLIC_CROSSMINT_AUTH_SMART_WALLET_API_KEY }}
                  NEXT_PUBLIC_EVM_CHAIN: "base-sepolia"
                  TESTS_CROSSMINT_API_KEY: ${{ secrets.TESTS_CROSSMINT_API_KEY_SMOKE_TESTS }}
                  MAILOSAUR_API_KEY: ${{ secrets.MAILOSAUR_API_KEY }}
                  MAILOSAUR_SERVER_ID: ${{ secrets.SERVER_ID_MAILOSAUR }}
                  MAILOSAUR_PHONE_NUMBER: ${{ secrets.PHONE_NUMBER_MAILOSAUR }}
                  PLAYWRIGHT_BASE_URL: "http://localhost:3000"
              run: |
                  mkdir -p test-results
                  pnpm exec playwright test --project=${{ matrix.browser }} || true
                  if [ ! -f test-results/playwright-results.json ]; then
                      echo "::error::No test results file generated — no tests were discovered. Check testMatch patterns in playwright.config.ts."
                      exit 1
                  fi

            - name: Generate test report
              if: always()
              working-directory: apps/wallets/quickstart-devkit
              run: |
                  mkdir -p test-results
                  if [ -f test-results/playwright-results.json ]; then
                      node scripts/generate-test-report.js test-results/playwright-results.json > test-results/report.md || printf "# E2E Regression Test Results\n\nFailed to generate report from JSON.\n" > test-results/report.md
                  else
                      printf "# E2E Regression Test Results\n\nTest results file not found.\n" > test-results/report.md
                  fi

            - name: Upload test results (${{ matrix.browser }})
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-test-results-${{ matrix.browser }}
                  path: apps/wallets/quickstart-devkit/test-results/
                  retention-days: 30

    notify:
        name: Notify Slack
        runs-on: ubuntu-latest
        needs: e2e-regression-tests
        if: always()

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download chromium results
              uses: actions/download-artifact@v4
              with:
                  name: e2e-test-results-chromium
                  path: test-results/chromium
              continue-on-error: true

            - name: Download firefox results
              uses: actions/download-artifact@v4
              with:
                  name: e2e-test-results-firefox
                  path: test-results/firefox
              continue-on-error: true

            - name: Download webkit results
              uses: actions/download-artifact@v4
              with:
                  name: e2e-test-results-webkit
                  path: test-results/webkit
              continue-on-error: true

            - name: Parse results and send to Slack
              env:
                  SLACK_WEBHOOK: ${{ secrets.SLACK_QA_ALERTS_WEBHOOK }}
                  GITHUB_RUN_ID: ${{ github.run_id }}
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  GITHUB_SHA: ${{ github.sha }}
                  MATRIX_RESULT: ${{ needs.e2e-regression-tests.result }}
              run: |
                  node << 'EOF'
                  const fs = require('fs');
                  const https = require('https');
                  const path = require('path');

                  const webhookUrl = process.env.SLACK_WEBHOOK;
                  if (!webhookUrl) {
                      console.error('SLACK_WEBHOOK environment variable is not set');
                      process.exit(1);
                  }

                  const browsers = ['chromium', 'firefox', 'webkit'];

                  function parseResults(filePath) {
                      if (!fs.existsSync(filePath)) return null;
                      try {
                          const results = JSON.parse(fs.readFileSync(filePath, 'utf8'));
                          let totalTests = 0, passedTests = 0, failedTests = 0, skippedTests = 0, duration = 0;
                          const failures = [];

                          function processTests(tests, suiteName) {
                              tests.forEach((test) => {
                                  totalTests++;
                                  const result = test.results && test.results[0] ? test.results[0] : null;
                                  const status = result?.status || 'unknown';
                                  if (status === 'passed') passedTests++;
                                  else if (status === 'failed') {
                                      failedTests++;
                                      failures.push({ title: test.title || 'Unknown Test', suite: suiteName, error: result?.error?.message || 'No error message' });
                                  } else if (status === 'skipped') skippedTests++;
                                  if (result?.duration) duration += result.duration;
                              });
                          }

                          function processSuite(suite) {
                              if (suite.tests) processTests(suite.tests, suite.title || 'Unknown Suite');
                              if (suite.specs) suite.specs.forEach(spec => spec.tests && processTests(spec.tests, spec.title || suite.title || 'Unknown Suite'));
                              if (suite.suites) suite.suites.forEach(processSuite);
                          }

                          if (results.suites) results.suites.forEach(processSuite);

                          if (totalTests === 0 && results.stats) {
                              passedTests = results.stats.expected || results.stats.passed || 0;
                              failedTests = results.stats.unexpected || results.stats.failed || 0;
                              skippedTests = results.stats.skipped || 0;
                              totalTests = passedTests + failedTests + skippedTests + (results.stats.flaky || 0);
                              duration = results.stats.duration || 0;
                          }

                          return { totalTests, passedTests, failedTests, skippedTests, duration, failures };
                      } catch (e) {
                          console.error('Error parsing results:', e.message);
                          return null;
                      }
                  }

                  const browserResults = {};
                  let overallFailed = process.env.MATRIX_RESULT === 'failure' || process.env.MATRIX_RESULT === 'cancelled';

                  for (const browser of browsers) {
                      const filePath = path.join('test-results', browser, 'playwright-results.json');
                      const result = parseResults(filePath);
                      browserResults[browser] = result;
                      if (result && result.failedTests > 0) overallFailed = true;
                  }

                  const statusEmoji = overallFailed ? '\u274C' : '\u2705';
                  const statusText = overallFailed ? 'Failed' : 'Passed';
                  const runUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
                  const commitUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}/commit/${process.env.GITHUB_SHA}`;
                  const shortSha = process.env.GITHUB_SHA.substring(0, 7);

                  function browserSummary(browser, result) {
                      if (!result) return `*${browser}:*\n\u274C No results (job failed or was cancelled)`;
                      const durationMin = (result.duration / 60000).toFixed(1);
                      const parts = [`${result.passedTests}\u2705`];
                      if (result.failedTests > 0) parts.push(`${result.failedTests}\u274C`);
                      if (result.skippedTests > 0) parts.push(`${result.skippedTests}\u23ED`);
                      return `*${browser}:*\n${parts.join(' ')} of ${result.totalTests} tests (${durationMin}m)`;
                  }

                  const slackMessage = {
                      text: `${statusEmoji} E2E Regression Tests \u2014 ${statusText}`,
                      blocks: [
                          {
                              type: 'header',
                              text: { type: 'plain_text', text: `${statusEmoji} E2E Regression Tests \u2014 ${statusText}` },
                          },
                          {
                              type: 'section',
                              fields: browsers.map(b => ({ type: 'mrkdwn', text: browserSummary(b, browserResults[b]) })),
                          },
                          {
                              type: 'section',
                              text: { type: 'mrkdwn', text: `*Run:* <${runUrl}|View workflow>\n*Commit:* <${commitUrl}|${shortSha}>` },
                          },
                      ],
                  };

                  const allFailures = browsers.flatMap(b => (browserResults[b]?.failures || []).map(f => ({ browser: b, ...f })));
                  if (allFailures.length > 0) {
                      const failText = allFailures.slice(0, 10)
                          .map(f => `\u2022 [${f.browser}] *${f.suite}* \u2014 ${f.title}\n  \`${f.error.substring(0, 200)}${f.error.length > 200 ? '...' : ''}\``)
                          .join('\n\n');
                      slackMessage.blocks.push({
                          type: 'section',
                          text: { type: 'mrkdwn', text: `*Failed Tests (first ${Math.min(10, allFailures.length)}):*\n\n${failText}${allFailures.length > 10 ? `\n\n_...and ${allFailures.length - 10} more_` : ''}` },
                      });
                  }

                  slackMessage.blocks.push({ type: 'divider' });
                  slackMessage.blocks.push({ type: 'section', text: { type: 'mrkdwn', text: `\uD83D\uDD17 <${runUrl}|View full logs and artifacts>` } });

                  const url = new URL(webhookUrl);
                  const postData = JSON.stringify(slackMessage);
                  const options = {
                      hostname: url.hostname, port: 443,
                      path: url.pathname + url.search, method: 'POST',
                      headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(postData) },
                  };
                  const req = https.request(options, (res) => {
                      let data = '';
                      res.on('data', c => data += c);
                      res.on('end', () => {
                          if (res.statusCode === 200) console.log('\u2705 Slack notification sent');
                          else { console.error(`\u274C Slack POST failed: ${res.statusCode} \u2014 ${data}`); process.exit(1); }
                      });
                  });
                  req.on('error', e => { console.error('\u274C ' + e.message); process.exit(1); });
                  req.write(postData);
                  req.end();
                  EOF
