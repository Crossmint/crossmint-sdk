plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.crossmint'
version = '0.0.1'

android {
  namespace "com.crossmint.expo.devicesigner"
  defaultConfig {
    versionCode 1
    versionName '0.0.1'
  }
}

dependencies {
  implementation "androidx.biometric:biometric:1.1.0"
}
